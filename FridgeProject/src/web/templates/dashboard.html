<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Fridge Dashboard</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <!-- Add Font Awesome for icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <div class="container">
        <header>
            <h1><i class="fas fa-snowflake"></i> Smart Fridge Monitor</h1>
            <p id="last-updated">Updating...</p>
        </header>

        <div class="dashboard-grid">
            <section class="card recommendations">
                <h2><i class="fas fa-utensils"></i> Consume First</h2>
                <div id="recommendations-list">
                    <!-- Populated by JS -->
                    <p>Loading...</p>
                </div>
            </section>

            <section class="card inventory">
                <h2><i class="fas fa-carrot"></i> Current Inventory</h2>
                <div id="inventory-grid" class="inventory-grid">
                    <!-- Populated by JS -->
                    <p>Loading...</p>
                </div>
            </section>

            <section class="card shopping-list">
                <h2><i class="fas fa-shopping-cart"></i> Shopping List</h2>
                <ul id="missing-list">
                    <!-- Populated by JS -->
                    <p>Loading...</p>
                </ul>
            </section>
        </div>
    </div>
    <script src="{{ url_for('static', filename='js/script.js') }}"></script>
</body>
</html>
